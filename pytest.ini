[pytest]
testpaths = src/tests
pythonpath = src
addopts = -ra -m "not browser and not slow"
asyncio_mode = auto
asyncio_default_fixture_loop_scope = function
markers =
    browser: testes E2E que exigem navegador real e WhatsApp Web
    slow: testes lentos (>2s) — persistent context, etc.; rodar com pytest -m slow
    integration: testes de integração Flask + Playwright
    rf01: RF01 — .env carregado antes do browser
    rf05: RF05 — Flask inicia automação
    rf04: RF04 — persistência de sessão do perfil WhatsApp Web
    rf03: RF03 — Playwright carrega a URL do WhatsApp Web
    rf06: RF06 — seletor de QR Code identificado pelo Playwright
    rnf01: RNF01 — resiliência de seletores CSS (Page Object)
