[pytest]
testpaths = src/tests
pythonpath = src
addopts = -ra -m "not browser"
asyncio_mode = auto
asyncio_default_fixture_loop_scope = function
markers =
    browser: testes E2E que exigem navegador real e WhatsApp Web
    integration: testes de integração Flask + Playwright
    rf01: RF01 — .env carregado antes do browser
    rf05: RF05 — Flask inicia automação
    rf06: RF06 — seletor de QR Code identificado pelo Playwright
